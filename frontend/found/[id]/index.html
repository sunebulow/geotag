<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tøj fundet!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 12px; }
    p { font-size: 16px; color: #555; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      font-size: 15px;
      color: #555;
      min-height: 24px;
    }
    .success { color: #16a34a; font-weight: 500; }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">👕</div>
    <h1>Du har fundet noget glemt tøj!</h1>
    <p>Tryk på knappen nedenfor for at sende ejeren en besked med din placering, så de kan hente det.</p>
    <button id="btn" onclick="sendLocation()">Send min placering til ejeren</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    // Hent profil-ID fra URL stien, fx /found/sune -> "sune"
    const profileId = window.location.pathname.split("/").filter(Boolean).pop();

    // VIGTIGT: Erstat med din Railway URL når du har deployed
    const BACKEND_URL = "web-production-4cece.up.railway.app";

    function setStatus(msg, type = "") {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = "status " + type;
    }

    function sendLocation() {
      const btn = document.getElementById("btn");
      btn.disabled = true;
      setStatus("Henter din placering...");

      if (!navigator.geolocation) {
        setStatus("Din browser understøtter ikke geolokation.", "error");
        btn.disabled = false;
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          setStatus("Sender besked til ejeren...");
          const { latitude, longitude } = position.coords;

          try {
            const res = await fetch(`${BACKEND_URL}/found/${profileId}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ profile_id: profileId, latitude, longitude }),
            });

            if (res.ok) {
              setStatus("✓ Ejeren er notificeret! Tak for hjælpen.", "success");
              btn.textContent = "Besked sendt!";
            } else {
              throw new Error("Serverfejl");
            }
          } catch {
            setStatus("Noget gik galt. Prøv igen.", "error");
            btn.disabled = false;
          }
        },
        (err) => {
          setStatus("Kunne ikke hente placering. Tillad venligst adgang til lokation.", "error");
          btn.disabled = false;
        }
      );
    }
  </script>
</body>
</html>
